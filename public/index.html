<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ornith OS</title>
    <style>
      :root {
        --accent: #fd8e5b;
        --bg: #14110f;
        --panel: #1d1916;
        --panel-2: #262019;
        --border: #3a2f26;
        --text: #f3ede7;
        --muted: #a99c8f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
      }
      a { color: var(--accent); }
      .sidebar {
        width: 260px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
      }
      .brand { font-size: 20px; font-weight: 700; }
      .brand span { color: var(--accent); }
      .brand small { display: block; color: var(--muted); font-weight: 400; font-size: 12px; }
      .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 8px; }
      .agent-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1; }
      .agent-item {
        padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 14px;
        border: 1px solid transparent;
      }
      .agent-item:hover { background: var(--panel-2); }
      .agent-item.active { background: var(--panel-2); border-color: var(--accent); }
      .agent-item small { display: block; color: var(--muted); font-size: 11px; }
      button {
        background: var(--accent); color: #1a120c; border: none; border-radius: 8px;
        padding: 9px 12px; font-weight: 600; cursor: pointer; font-size: 13px;
      }
      button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
      button:hover { filter: brightness(1.05); }
      .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .tabs { display: flex; gap: 4px; padding: 12px 16px 0; border-bottom: 1px solid var(--border); }
      .tab { padding: 8px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; font-size: 14px; }
      .tab.active { color: var(--text); border-color: var(--accent); }
      .view { flex: 1; overflow-y: auto; padding: 20px; display: none; }
      .view.active { display: block; }
      #chat { display: flex; flex-direction: column; gap: 14px; max-width: 820px; margin: 0 auto; }
      .msg { display: flex; flex-direction: column; gap: 4px; }
      .msg .who { font-size: 11px; color: var(--muted); }
      .bubble { padding: 12px 14px; border-radius: 12px; white-space: pre-wrap; line-height: 1.5; }
      .user .bubble { background: var(--accent); color: #1a120c; align-self: flex-end; max-width: 80%; }
      .assistant .bubble { background: var(--panel-2); border: 1px solid var(--border); }
      .reasoning {
        font-size: 12px; color: var(--muted); border-left: 2px solid var(--border);
        padding: 6px 10px; margin-top: 6px; white-space: pre-wrap; display: none;
      }
      .reasoning.show { display: block; }
      .toggle-reasoning { font-size: 11px; color: var(--accent); cursor: pointer; }
      .steps { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .composer { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); max-width: 820px; margin: 0 auto; width: 100%; }
      .composer textarea {
        flex: 1; resize: none; background: var(--panel-2); color: var(--text);
        border: 1px solid var(--border); border-radius: 10px; padding: 10px; font: inherit;
      }
      .form { max-width: 620px; display: flex; flex-direction: column; gap: 12px; }
      .form label { font-size: 13px; color: var(--muted); }
      .form input, .form textarea {
        width: 100%; background: var(--panel-2); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px; padding: 9px; font: inherit;
      }
      .row { display: flex; gap: 10px; align-items: flex-end; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
      .src { font-size: 10px; color: var(--muted); }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">Ornith<span>OS</span><small>durable agent runtime</small></div>
      <div class="section-label">Agents</div>
      <div class="agent-list" id="agentList"></div>
      <button class="ghost" id="spawnBtn">+ Spawn agent</button>
    </aside>

    <main class="main">
      <div class="tabs">
        <div class="tab active" data-view="chatView">Chat</div>
        <div class="tab" data-view="tasksView">Scheduled</div>
        <div class="tab" data-view="configView">Config</div>
      </div>

      <section class="view active" id="chatView">
        <div id="chat"></div>
      </section>
      <div class="composer" id="composer">
        <textarea id="input" rows="1" placeholder="Message the agent…"></textarea>
        <button id="sendBtn">Send</button>
      </div>

      <section class="view" id="tasksView">
        <div class="form">
          <h3>Schedule a recurring task</h3>
          <label>Prompt the agent runs on a schedule</label>
          <textarea id="taskPrompt" rows="2" placeholder="e.g. Summarize new activity"></textarea>
          <div class="row">
            <div>
              <label>Every (minutes)</label>
              <input id="taskEvery" type="number" value="60" min="1" />
            </div>
            <button id="addTaskBtn">Add task</button>
          </div>
          <p class="src">Cron ticks every 5 minutes; due tasks run then.</p>
          <h3>Scheduled tasks</h3>
          <div id="taskList"></div>
        </div>
      </section>

      <section class="view" id="configView">
        <div class="form">
          <h3>Agent configuration</h3>
          <label>Name</label>
          <input id="cfgName" />
          <label>Instructions (system prompt)</label>
          <textarea id="cfgInstructions" rows="8"></textarea>
          <button id="saveCfgBtn">Save</button>
          <p class="src" id="srcLabel"></p>
        </div>
      </section>
    </main>

    <script src="chat.js"></script>

    <!-- Vercel Web Analytics. The site is hosted on Vercel, so the script is
         served same-origin from /_vercel/insights/script.js. Enable Web
         Analytics for the project in the Vercel dashboard to start collecting. -->

      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
